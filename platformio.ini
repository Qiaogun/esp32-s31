[platformio]
src_dir = ../esp32-s3/src
include_dir = ../esp32-s3/include
boards_dir = boards
default_envs = esp32_s31_function_coreboard_1

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
  bodmer/TFT_eSPI@2.5.34
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DUSER_SETUP_LOADED=1
  -DGC9A01_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=240
  -DTFT_MOSI=11
  -DTFT_MISO=12
  -DTFT_SCLK=10
  -DTFT_CS=9
  -DTFT_DC=8
  -DTFT_RST=14
  -DTFT_BL=2
  -DTFT_BACKLIGHT_ON=HIGH
  -DSPI_FREQUENCY=80000000
  -DSPI_READ_FREQUENCY=16000000
  -DSPI_TOUCH_FREQUENCY=2500000
  -DLOAD_GLCD=1
  -DSMOOTH_FONT=1
  -DOUO_HAS_LCD=0
  -DOUO_HAS_TOUCH=0
  -DOUO_HAS_IMU=0
  -DOUO_LCD_BACKLIGHT_PIN=-1
  -DOUO_TOUCH_INT_PIN=-1
  -DOUO_TOUCH_RST_PIN=-1

[env:esp32_s31_function_coreboard_1]
board = esp32_s31_function_coreboard_1
build_flags =
  ${env.build_flags}
  -DOUO_BOARD_NAME=\"ESP32-S31-Function-CoreBoard-1\"
  -DOUO_I2C_SDA_PIN=0
  -DOUO_I2C_SCL_PIN=1

[env:esp32_s31_korvo_1]
board = esp32_s31_korvo_1
build_flags =
  ${env.build_flags}
  -DOUO_BOARD_NAME=\"ESP32-S31-Korvo-1\"
  -DOUO_I2C_SDA_PIN=0
  -DOUO_I2C_SCL_PIN=1
